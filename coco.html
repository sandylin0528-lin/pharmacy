<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>透析液庫存管理 — 台大雲林分院 藥劑部</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft JhengHei",sans-serif;background:#f4f6f9;color:#1a3a52;font-size:14px}
.wrap{max-width:1200px;margin:0 auto;padding:1.25rem}
.top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.top-title{font-size:16px;font-weight:600;color:#1a3a52}
.top-sub{font-size:11px;color:#6b8a9e;margin-top:2px}
.btn-row{display:flex;gap:6px}
.btn{font-size:12px;padding:6px 14px;border-radius:6px;border:1px solid #b0c8e0;background:white;color:#1a3a52;cursor:pointer;display:flex;align-items:center;gap:5px;font-family:inherit}
.btn:hover{background:#eaf2fa}
.btn-accent{border-color:#2c5f8a;background:#e6f0f8;color:#2c5f8a;font-weight:500}
.btn-accent:hover{background:#2c5f8a;color:white}
.tabs{display:flex;border-bottom:2px solid #c8dcea;margin-bottom:1.25rem;gap:4px;align-items:flex-end}
.tab{padding:9px 18px;font-size:13px;cursor:pointer;border:1px solid transparent;border-bottom:none;color:#5a5a5a;font-family:inherit;border-radius:8px 8px 0 0;background:#e3e3e3;position:relative;top:1px;font-weight:500;transition:filter .12s}
.tab:hover{filter:brightness(0.96)}
.tab.tab-douniu{background:#d6e8f5;color:#1a4a70}
.tab.tab-huwei{background:#e3dcf7;color:#4a2e8a}
.tab.tab-log{background:#dcefe0;color:#1a6b3a}
.tab.active{font-weight:700;border:2px solid #c8dcea;border-bottom:2px solid white;box-shadow:0 -2px 4px rgba(0,0,0,.04)}
.tab.tab-douniu.active{background:#ffffff;color:#1a4a70;border-color:#9fc4e0}
.tab.tab-huwei.active{background:#ffffff;color:#4a2e8a;border-color:#c2aee8}
.tab.tab-log.active{background:#ffffff;color:#1a6b3a;border-color:#a6dcb1}
.sum-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1.25rem}
.sum-card{background:white;border:1px solid #c8dcea;border-radius:8px;padding:12px 14px}
.sum-lbl{font-size:11px;color:#6b8a9e;margin-bottom:4px}
.sum-num{font-size:22px;font-weight:600;color:#1a3a52}
.sum-num.warn{color:#9a6800}
.sum-num.danger{color:#8b1a1a}
.tbl-wrap{border:1px solid #b0c8e0;border-radius:10px;overflow-x:auto;margin-bottom:1.25rem}
.tbl-sec-hd{background:#2c5f8a;color:#e8f2fb;font-size:12px;font-weight:600;padding:7px 14px;letter-spacing:.05em}
table{width:100%;border-collapse:collapse;table-layout:fixed}
thead tr{background:#3a72a0}
thead th{color:#e8f2fb;font-size:11px;font-weight:500;padding:7px 6px;text-align:left;white-space:normal;line-height:1.3}
.col-code{width:6%}
.col-name{width:22%}
.col-batch{width:5%}
.col-exp{width:11%}
.col-stock{width:8%}
.col-act{width:8%}
.col-used{width:8%}
.col-rem{width:6%}
.col-note{width:15%}
.col-transfer{width:6%}
td.act-cell{padding:5px 2px;text-align:center;white-space:nowrap;overflow:hidden}
tr.odd{background:#d6e8f5}
tr.even{background:#f0f0f0}
tr.odd:hover{background:#c2daf0}
tr.even:hover{background:#e2e2e2}
td{font-size:12px;color:#1a3a52;padding:5px 8px;vertical-align:top;border-bottom:0.5px solid #b8cfe0}
td input,td .rem-cell{vertical-align:middle}
tr:last-child td{border-bottom:none}
td.code-cell{font-weight:600;color:#1a3a52;font-size:11px;padding-top:9px}
td.rem-cell{font-weight:600;text-align:center;font-size:14px;padding-top:9px}
td.rem-ok{color:#1a6b3a}
td.rem-low{color:#8a5a00}
td.rem-zero{color:#8b1a1a}
.inp{font-size:12px;padding:4px 6px;border:1px solid #9ab8d0;border-radius:4px;background:white;color:#1a3a52;width:100%;font-family:inherit}
.inp:focus{outline:none;border-color:#2c5f8a;background:#f0f8ff}
.inp-center{text-align:center}
.strip-warn{background:#fff3cd;border:1px solid #e6c200;border-radius:4px;padding:2px 7px;font-size:11px;color:#7a5800;display:inline-flex;align-items:center;gap:3px;margin-top:3px}
.strip-danger{background:#fde8e8;border:1px solid #e05555;border-radius:4px;padding:2px 7px;font-size:11px;color:#8b1a1a;display:inline-flex;align-items:center;gap:3px;margin-top:3px}
.strip-low{background:#fde8e8;border:1px solid #e05555;border-radius:4px;padding:2px 7px;font-size:11px;color:#8b1a1a;display:inline-flex;align-items:center;gap:3px;margin-top:3px}
.add-batch-btn{font-size:11px;color:#2c5f8a;cursor:pointer;border:1px solid #9ab8d0;border-radius:4px;background:#eaf2fa;padding:4px 2px;line-height:1.2;width:100%;white-space:nowrap;font-weight:500}
.add-batch-btn:hover{background:#2c5f8a;color:white}
.del-btn{font-size:11px;color:#999;cursor:pointer;border:1px solid #ccc;border-radius:3px;background:white;padding:2px 4px;font-family:inherit;width:100%}
.del-btn:hover{color:#c00;border-color:#e05555;background:#fde8e8}
.transfer-btn{font-size:13px;color:#2c5f8a;cursor:pointer;border:1px solid #9ab8d0;border-radius:4px;background:white;padding:3px 6px;font-family:inherit;width:100%}
.transfer-btn:hover{background:#2c5f8a;color:white}
.log-card{background:white;border:1px solid #c8dcea;border-radius:10px;padding:1rem}
.log-row{display:flex;justify-content:space-between;align-items:flex-start;padding:7px 10px;border-bottom:0.5px solid #dde8f0;gap:8px;font-size:12px;border-radius:6px}
.log-row:last-child{border-bottom:none}
.log-row.dir-d2h{background-color:#6664be !important;color:#ffffff}
.log-row.dir-h2d{background-color:#ABA1EB !important;color:#1a1a3a}
.log-row.dir-d2h span,.log-row.dir-d2h .log-time{color:#ffffff}
.log-row.dir-h2d span,.log-row.dir-h2d .log-time{color:#1a1a3a}
.log-row.dir-d2h .log-tag,.log-row.dir-h2d .log-tag{background:#ffffff;color:#1a3a52 !important;font-weight:700;border:1px solid rgba(0,0,0,.08)}
.log-row.dir-d2h .log-code{color:rgba(255,255,255,.85) !important}
.log-row.dir-h2d .log-code{color:rgba(26,26,58,.7) !important}
.log-row.dir-d2h,.log-row.dir-h2d{margin:2px 0;border-bottom:none}
.transfer-legend{display:flex;gap:14px;align-items:center;margin-bottom:10px;font-size:11px;color:#6b8a9e}
.transfer-legend-dot{display:inline-block;width:10px;height:10px;border-radius:3px;margin-right:4px;vertical-align:middle}
.log-tag{font-size:11px;padding:1px 7px;border-radius:4px;background:#d6e8f5;color:#1a3a52;white-space:nowrap;font-weight:500}
.log-time{color:#6b8a9e;font-size:11px;white-space:nowrap}
.setting-card{background:white;border:1px solid #c8dcea;border-radius:10px;padding:1rem}
.settings-subtabs{display:flex;gap:6px;margin:10px 0 14px}
.settings-subtab{font-size:12px;padding:6px 14px;border-radius:6px;border:1px solid #c8dcea;background:#f0f4f8;color:#5a5a5a;cursor:pointer;font-family:inherit}
.settings-subtab.active{background:#2c5f8a;border-color:#2c5f8a;color:white;font-weight:600}
.setting-desc{font-size:12px;color:#6b8a9e;margin-bottom:12px}
.setting-row{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:0.5px solid #dde8f0}
.setting-row:last-child{border-bottom:none}
.setting-input{width:76px;font-size:13px;padding:5px 8px;border:1px solid #9ab8d0;border-radius:4px;background:white;color:#1a3a52;text-align:center;font-family:inherit}
.pane{display:none}
.pane.active{display:block}
.toast{position:fixed;bottom:20px;right:20px;background:#1a3a52;color:white;padding:10px 18px;border-radius:8px;font-size:13px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999}
.toast.show{opacity:1}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:1000;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal-box{background:white;border-radius:12px;padding:1.5rem;width:100%;max-width:440px;box-shadow:0 10px 40px rgba(0,0,0,.2)}
.modal-title{font-size:15px;font-weight:600;color:#1a3a52;margin-bottom:4px}
.modal-sub{font-size:12px;color:#6b8a9e;margin-bottom:1rem}
.modal-fld{margin-bottom:12px}
.modal-fld label{display:block;font-size:12px;color:#1a3a52;margin-bottom:4px;font-weight:500}
.modal-fld input,.modal-fld select{width:100%;font-size:13px;padding:7px 10px;border:1px solid #9ab8d0;border-radius:6px;font-family:inherit;color:#1a3a52}
.modal-fld input:focus,.modal-fld select:focus{outline:none;border-color:#2c5f8a}
.modal-hint{font-size:11px;color:#6b8a9e;margin-top:3px}
.modal-hint.error{color:#c00}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:1.25rem}
.modal-btn{font-size:13px;padding:7px 16px;border-radius:6px;border:1px solid #9ab8d0;background:white;color:#1a3a52;cursor:pointer;font-family:inherit}
.modal-btn.primary{background:#2c5f8a;border-color:#2c5f8a;color:white;font-weight:500}
.modal-btn.primary:hover{background:#1a4a70}
.modal-btn:hover{background:#f0f4f8}
</style>
</head>
<body>
<div class="wrap">
  <div class="top-bar">
    <div>
      <div class="top-title">透析液庫存管理</div>
      <div class="top-sub">台大雲林分院　藥劑部　<span id="sync-status" style="color:#6b8a9e">● 連線中…</span></div>
    </div>
    <div class="btn-row">
      <button class="btn" onclick="showTab('settings')">⚙ 安全庫存</button>
      <button class="btn" onclick="exportCSV()">↓ 匯出 CSV</button>
      <button class="btn btn-accent" id="savebtn" onclick="saveAll()">💾 儲存</button>
    </div>
  </div>

  <div class="tabs">
    <button class="tab tab-douniu active" id="tabn-douniu" onclick="showTab('douniu')">🏥 斗六院區</button>
    <button class="tab tab-huwei" id="tabn-huwei" onclick="showTab('huwei')">🏥 虎尾院區</button>
    <button class="tab tab-log" id="tabn-log" onclick="showTab('log')">📋 異動紀錄</button>
    <button class="tab" id="tabn-settings" onclick="showTab('settings')" style="display:none"></button>
  </div>

  <div id="pane-douniu" class="pane active"></div>
  <div id="pane-huwei" class="pane"></div>
  <div id="pane-log" class="pane"></div>
  <div id="pane-settings" class="pane"></div>
</div>
<div class="toast" id="toast"></div>

<div class="modal-overlay" id="transferModal">
  <div class="modal-box">
    <div class="modal-title">院區調撥</div>
    <div class="modal-sub" id="tf-itemname">—</div>
    <div class="modal-fld">
      <label>從</label>
      <input type="text" id="tf-from" disabled>
    </div>
    <div class="modal-fld">
      <label>調往</label>
      <input type="text" id="tf-to" disabled>
    </div>
    <div class="modal-fld">
      <label>調撥數量（袋）</label>
      <input type="number" id="tf-qty" min="1" value="1">
      <div class="modal-hint" id="tf-stock-hint">來源批次目前剩餘：—</div>
    </div>
    <div class="modal-fld">
      <label>撥補紀錄單號</label>
      <input type="text" id="tf-docno" placeholder="例如：TRF-20260630-01">
    </div>
    <div class="modal-fld">
      <label>備註（選填）</label>
      <input type="text" id="tf-note" placeholder="例如：醫囑開立5袋，斗六支援虎尾2袋">
    </div>
    <div class="modal-actions">
      <button class="modal-btn" onclick="closeTransfer()">取消</button>
      <button class="modal-btn primary" onclick="confirmTransfer()">確認調撥</button>
    </div>
  </div>
</div>

<script>
const ITEMS={
  regular:[
    {code:'D150',name:'1.5% 5L Dianeal (5193)'},
    {code:'D12U',name:'1.5% 2L Ultrabag Dianeal (9866)'},
    {code:'D250',name:'2.5% 5L Dianeal (5194)'},
    {code:'D22U',name:'2.5% 2L Ultrabag Dianeal (9876)'},
    {code:'E720',name:'ExtranealPD 單袋 (4974)'},
    {code:'E72U',name:'ExtranealPD 雙袋 (4984)'},
    {code:'DL15',name:'Lc 1.5% 5L Dianeal (4826)'},
    {code:'DU22',name:'Lc 2.5% 2L Ultrabag Dianeal (9776)'},
    {code:'DL25',name:'Lc 2.5% 5L Dianeal (5202)'},
    {code:'DU12',name:'Lc 1.5% 2L Ultrabag Dianeal (9766)'},
  ],
  hd:[
    {code:'BIBA',name:'Bibag'},
    {code:'HE16',name:'Hemodialysis No.16'},
    {code:'HE17',name:'Hemodialysis No.17'},
    {code:'HE10',name:'Hemodialysis No.110'},
    {code:'THCB',name:'Hemodialysis No.111CB'},
  ],
  home:[
    {code:'D225',name:'2.5% 2.5L Dianeal (5178)'},
    {code:'DL13',name:'Lc 1.5% 2.5L Dianeal (5718)'},
    {code:'DU13',name:'Lc 1.5% 2.5L Ultrabag Dianeal (9768)'},
    {code:'DL23',name:'Lc 2.5% 2.5L Dianeal (9728)'},
    {code:'DL43',name:'Lc 4.25% 2.5L Dianeal (9748)'},
    {code:'DU42',name:'Lc 4.25% 2L Ultrabag Dianeal (9796)'},
    {code:'BAL1',name:'Balance 1.5% Glucose Ca:1.25mmol/L'},
    {code:'BAL2',name:'Balance 2.3% Glucose Ca:1.25mmol/L'},
  ],
  emergency:[
    {code:'D125',name:'1.5% 2.5L Dianeal (5168)'},
    {code:'DU23',name:'Lc 2.5% 2.5L Ultrabag Dianeal (9778)'},
    {code:'DL45',name:'Lc 4.25% 5L Dianeal (5203)'},
  ]
};
const SECS=[{key:'regular',label:'常備品項'},{key:'hd',label:'HD 藥水'},{key:'home',label:'居家'},{key:'emergency',label:'緊急採購品項'}];
const ALL=Object.values(ITEMS).flat();

function defBatch(){return{qty:0,used:0,exp:'',note:''};}
function defItem(){return{batches:[defBatch()]};}
function defCampus(){const s={};ALL.forEach(i=>s[i.code]=defItem());return s;}

let state={douniu:defCampus(),huwei:defCampus()};
let safeStock={douniu:{},huwei:{}};
let logs=[];
const today=new Date();
let currentTab='douniu';
let rowCounter=0;

function monthsLeft(expStr){
  if(!expStr)return null;
  const e=new Date(expStr+'-01');
  return(e.getFullYear()-today.getFullYear())*12+(e.getMonth()-today.getMonth());
}
function getItem(campus,code){
  if(!state[campus][code])state[campus][code]=defItem();
  const d=state[campus][code];
  if(!d.batches||!d.batches.length)d.batches=[defBatch()];
  return d;
}
function totalStock(d){return d.batches.reduce((s,b)=>s+(parseInt(b.qty)||0),0);}
function totalUsed(d){return d.batches.reduce((s,b)=>s+(parseInt(b.used)||0),0);}
function batchRemaining(b){return Math.max(0,(parseInt(b.qty)||0)-(parseInt(b.used)||0));}
function remaining(d){return d.batches.reduce((s,b)=>s+batchRemaining(b),0);}
function worstExp(d){
  let w=null;
  d.batches.forEach(b=>{if(!b.exp)return;const m=monthsLeft(b.exp);if(w===null||m<w)w=m;});
  return w;
}
function getSummary(campus){
  let total=0,warnC=0,expC=0,lowC=0;
  ALL.forEach(i=>{
    const d=getItem(campus,i.code);
    const rem=remaining(d);total+=rem;
    const m=worstExp(d);
    if(m!==null&&m<=0)expC++;else if(m!==null&&m<=8)warnC++;
    const min=parseInt(safeStock[campus]?.[i.code])||0;
    if(min>0&&rem<min)lowC++;
  });
  return{total,warnC,expC,lowC};
}
function boldCode(name){
  return name.replace(/\((\d+)\)/g,'(<b style="font-weight:700">$1</b>)');
}
function expTag(d){
  const m=worstExp(d);
  if(m===null)return'';
  if(m<=0)return'<span class="strip-danger">⚠ 已到期</span>';
  if(m<=8)return`<span class="strip-warn">⏰ ${m}個月</span>`;
  return'';
}
function lowTag(rem,campus,code){
  const min=parseInt(safeStock[campus]?.[code])||0;
  if(min>0&&rem<min)return`<span class="strip-low">📦 低於${min}袋（最大可存上限）</span>`;
  return'';
}
function renderItemRows(campus,item){
  const d=getItem(campus,item.code);
  const rem=remaining(d);
  const min=parseInt(safeStock[campus]?.[item.code])||0;
  const isLow=min>0&&rem<min;
  const bc=d.batches.length;
  let h='';
  d.batches.forEach((b,idx)=>{
    rowCounter++;
    const rc=rowCounter%2===0?'even':'odd';
    const isFirst=idx===0;
    const bRem=batchRemaining(b);
    let bRemCls=bRem===0?'rem-zero':'rem-ok';
    h+=`<tr class="${rc}">`;
    if(isFirst){
      h+=`<td class="code-cell"${bc>1?` rowspan="${bc}"`:''}>${item.code}</td>`;
      h+=`<td${bc>1?` rowspan="${bc}"`:''}><div style="line-height:1.4">${boldCode(item.name)}</div>${expTag(d)}${isFirst?lowTag(rem,campus,item.code):''}</td>`;
    }
    h+=`<td style="text-align:center;color:#6b8a9e;font-size:11px">批${idx+1}</td>`;
    h+=`<td><input class="inp" type="month" value="${b.exp||''}" onchange="setBatch('${campus}','${item.code}',${idx},'exp',this.value)"></td>`;
    h+=`<td><input class="inp inp-center" type="number" min="0" value="${b.qty||0}" onchange="setBatch('${campus}','${item.code}',${idx},'qty',this.value)"></td>`;
    if(bc>1){
      h+=`<td class="act-cell">${isFirst?`<button class="add-batch-btn" onclick="addBatch('${campus}','${item.code}')" title="新增效期批次">＋ 新增效期</button>`:`<button class="del-btn" onclick="delBatch('${campus}','${item.code}',${idx})" title="刪除批次">✕</button>`}</td>`;
    }else{
      h+=`<td class="act-cell"><button class="add-batch-btn" onclick="addBatch('${campus}','${item.code}')" title="新增效期批次">＋ 新增效期</button></td>`;
    }
    h+=`<td><input class="inp inp-center" type="number" min="0" value="${b.used||0}" onchange="setBatch('${campus}','${item.code}',${idx},'used',this.value)"></td>`;
    h+=`<td class="rem-cell ${bRemCls}">${bRem}</td>`;
    h+=`<td><input class="inp" type="text" value="${b.note||''}" onchange="setBatch('${campus}','${item.code}',${idx},'note',this.value)" placeholder="備註"></td>`;
    h+=`<td class="act-cell"><button class="transfer-btn" onclick="openTransfer('${campus}','${item.code}',${idx})" title="調撥到另一院區">⇄</button></td>`;
    h+='</tr>';
  });
  return h;
}
function renderSection(campus,sec){
  const items=ITEMS[sec.key];
  let h=`<div class="tbl-wrap"><div class="tbl-sec-hd">${sec.label}</div>
    <table><thead><tr>
      <th class="col-code">藥品四碼</th><th class="col-name">藥品名稱</th>
      <th class="col-batch">批次</th><th class="col-exp">效期</th>
      <th class="col-stock">庫存袋</th><th class="col-act">新增效期</th>
      <th class="col-used">使用量</th><th class="col-rem">剩餘</th><th class="col-note">備註</th><th class="col-transfer">調撥</th>
    </tr></thead><tbody>`;
  items.forEach(item=>h+=renderItemRows(campus,item));
  return h+'</tbody></table></div>';
}
function renderSummary(campus){
  const{total,warnC,expC,lowC}=getSummary(campus);
  return`<div class="sum-grid">
    <div class="sum-card"><div class="sum-lbl">目前總庫存（袋）</div><div class="sum-num">${total}</div></div>
    <div class="sum-card"><div class="sum-lbl">效期預警（≤8月）</div><div class="sum-num warn">${warnC}</div></div>
    <div class="sum-card"><div class="sum-lbl">效期到期品項</div><div class="sum-num danger">${expC}</div></div>
    <div class="sum-card"><div class="sum-lbl">庫存不足品項</div><div class="sum-num danger">${lowC}</div></div>
  </div>`;
}
function renderCampus(campus){
  rowCounter=0;
  let h=renderSummary(campus);
  SECS.forEach(sec=>h+=renderSection(campus,sec));
  return h;
}
function renderLog(){
  if(!logs.length)return'<div style="color:#6b8a9e;font-size:13px;padding:1rem">尚無異動紀錄。</div>';
  let h=`<div class="transfer-legend">
    <span><span class="transfer-legend-dot" style="background:#6664be"></span>斗六 → 虎尾調撥</span>
    <span><span class="transfer-legend-dot" style="background:#ABA1EB"></span>虎尾 → 斗六調撥</span>
  </div><div class="log-card">`;
  [...logs].reverse().slice(0,100).forEach(l=>{
    const dirCls=l.transferDir==='d2h'?' dir-d2h':l.transferDir==='h2d'?' dir-h2d':'';
    h+=`<div class="log-row${dirCls}">
      <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">
        <span class="log-tag">${l.campus}</span>
        <span class="log-code" style="color:#6b8a9e;font-size:11px">${l.code}</span>
        <span>${l.msg}</span>
      </div>
      <span class="log-time">${l.time}</span>
    </div>`;
  });
  return h+'</div>';
}
let settingsCampus='douniu';
function renderSettings(){
  const label=settingsCampus==='douniu'?'斗六院區':'虎尾院區';
  let h=`<div class="setting-card">
    <div class="setting-desc">設定各品項在<b>${label}</b>的最大可存箱數上限（袋），庫存不足時自動標示紅色。兩院區各自獨立設定，可不同。</div>
    <div class="settings-subtabs">
      <button class="settings-subtab${settingsCampus==='douniu'?' active':''}" onclick="switchSettingsCampus('douniu')">🏥 斗六院區</button>
      <button class="settings-subtab${settingsCampus==='huwei'?' active':''}" onclick="switchSettingsCampus('huwei')">🏥 虎尾院區</button>
    </div>`;
  ALL.forEach(item=>{
    const v=safeStock[settingsCampus]?.[item.code]||0;
    h+=`<div class="setting-row">
      <div><div style="font-size:13px">${boldCode(item.name)}</div><div style="font-size:11px;color:#6b8a9e">${item.code}</div></div>
      <input class="setting-input" type="number" min="0" value="${v}" onchange="setSafe('${item.code}',this.value)">
    </div>`;
  });
  return h+'</div>';
}
function switchSettingsCampus(campus){
  settingsCampus=campus;
  document.getElementById('pane-settings').innerHTML=renderSettings();
}
function addLog(campus,code,msg){
  const item=ALL.find(i=>i.code===code);
  const now=new Date();
  const t=`${now.getMonth()+1}/${now.getDate()} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  logs.push({campus:campus==='douniu'?'斗六':'虎尾',code,msg:item?`${item.name.split('(')[0].trim()} — ${msg}`:msg,time:t});
}
function refreshCampus(campus){
  const pane=document.getElementById('pane-'+campus);
  if(pane&&pane.classList.contains('active'))pane.innerHTML=renderCampus(campus);
}
function setBatch(campus,code,idx,field,val){
  const d=getItem(campus,code);
  const textFields=['exp','note'];
  const parsed=textFields.includes(field)?val:Math.max(0,parseInt(val)||0);
  d.batches[idx][field]=parsed;
  const msgMap={qty:'數量→'+parsed+' 袋',exp:'效期→'+val,used:'使用量→'+parsed+' 袋（剩 '+batchRemaining(d.batches[idx])+' 袋）',note:'備註已更新'};
  addLog(campus,code,`批次${idx+1} ${msgMap[field]}`);
  refreshCampus(campus);saveAll();
}
function addBatch(campus,code){
  getItem(campus,code).batches.push(defBatch());
  addLog(campus,code,'新增批次');
  refreshCampus(campus);saveAll();
}
function delBatch(campus,code,idx){
  const d=getItem(campus,code);
  if(d.batches.length<=1){d.batches=[defBatch()];}else{d.batches.splice(idx,1);}
  addLog(campus,code,`刪除批次${idx+1}`);
  refreshCampus(campus);saveAll();
}
function setSafe(code,val){
  if(!safeStock[settingsCampus])safeStock[settingsCampus]={};
  safeStock[settingsCampus][code]=Math.max(0,parseInt(val)||0);
  refreshCampus(settingsCampus);
  saveAll();
}
let tfContext=null;
function openTransfer(campus,code,idx){
  const d=getItem(campus,code);
  const b=d.batches[idx];
  const item=ALL.find(i=>i.code===code);
  const otherCampus=campus==='douniu'?'huwei':'douniu';
  tfContext={campus,code,idx,otherCampus};
  document.getElementById('tf-itemname').textContent=`${item.code}　${item.name}（批${idx+1}，效期：${b.exp||'未設定'}）`;
  document.getElementById('tf-from').value=(campus==='douniu'?'斗六院區':'虎尾院區');
  document.getElementById('tf-to').value=(otherCampus==='douniu'?'斗六院區':'虎尾院區');
  const bRem=batchRemaining(b);
  document.getElementById('tf-qty').value=1;
  document.getElementById('tf-qty').max=bRem;
  document.getElementById('tf-stock-hint').textContent=`來源批次目前剩餘：${bRem} 袋`;
  document.getElementById('tf-stock-hint').className='modal-hint';
  document.getElementById('tf-docno').value='';
  document.getElementById('tf-note').value='';
  document.getElementById('transferModal').classList.add('show');
}
function closeTransfer(){
  document.getElementById('transferModal').classList.remove('show');
  tfContext=null;
}
function confirmTransfer(){
  if(!tfContext)return;
  const{campus,code,idx,otherCampus}=tfContext;
  const qty=Math.max(0,parseInt(document.getElementById('tf-qty').value)||0);
  const docno=document.getElementById('tf-docno').value.trim();
  const note=document.getElementById('tf-note').value.trim();
  const d=getItem(campus,code);
  const b=d.batches[idx];
  const bRem=batchRemaining(b);
  const hint=document.getElementById('tf-stock-hint');
  if(qty<=0){hint.textContent='請輸入大於 0 的調撥數量';hint.className='modal-hint error';return;}
  if(qty>bRem){hint.textContent=`調撥數量不可超過來源批次剩餘（${bRem} 袋）`;hint.className='modal-hint error';return;}
  if(!docno){hint.textContent='請填寫撥補紀錄單號';hint.className='modal-hint error';return;}

  // 來源：用 used 扣減（視為已調出，計入使用量邏輯但標註為調撥）
  b.used=(parseInt(b.used)||0)+qty;

  // 目標：找相同藥品代碼、相同效期的批次合併，否則新增批次
  const destItem=getItem(otherCampus,code);
  let destBatch=destItem.batches.find(x=>x.exp===b.exp && x.exp!=='');
  if(destBatch){
    destBatch.qty=(parseInt(destBatch.qty)||0)+qty;
  }else{
    // 若目標只有一個空白批次（qty=0且無效期），直接利用它
    const emptyBatch=destItem.batches.find(x=>(parseInt(x.qty)||0)===0 && !x.exp && (parseInt(x.used)||0)===0);
    if(emptyBatch){
      emptyBatch.qty=qty;emptyBatch.exp=b.exp;
    }else{
      destItem.batches.push({qty:qty,used:0,exp:b.exp,note:`調撥入庫（單號：${docno}）`});
    }
  }
  if(!destBatch){
    const newB=destItem.batches.find(x=>x.exp===b.exp && (parseInt(x.qty)||0)===qty);
    if(newB)newB.note=`調撥入庫（單號：${docno}）${note?'｜'+note:''}`;
  }

  const item=ALL.find(i=>i.code===code);
  const fromLabel=campus==='douniu'?'斗六':'虎尾';
  const toLabel=otherCampus==='douniu'?'斗六':'虎尾';
  const now=new Date();
  const t=`${now.getMonth()+1}/${now.getDate()} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  const logMsg=`${item.name.split('(')[0].trim()} — 調撥 ${qty} 袋：${fromLabel}→${toLabel}（單號：${docno}）${note?'｜備註：'+note:''}`;
  logs.push({campus:fromLabel,code,msg:logMsg,time:t,transferDir:fromLabel==='斗六'?'d2h':'h2d',isTransfer:true});
  logs.push({campus:toLabel,code,msg:`${item.name.split('(')[0].trim()} — 接收調撥 ${qty} 袋，來自${fromLabel}（單號：${docno}）`,time:t,transferDir:toLabel==='斗六'?'d2h':'h2d',isTransfer:true});

  closeTransfer();
  refreshCampus('douniu');
  refreshCampus('huwei');
  saveAll();
  showToast(`✓ 已調撥 ${qty} 袋（${fromLabel}→${toLabel}）`);
}

function exportCSV(){
  const rows=[['院區','藥品代碼','藥品名稱','批次','數量(袋)','效期','使用量','批次剩餘','品項總剩餘','最大可存箱數上限(該院區)','備註']];
  ['douniu','huwei'].forEach(campus=>{
    const label=campus==='douniu'?'斗六':'虎尾';
    ALL.forEach(item=>{
      const d=getItem(campus,item.code);
      const totalRem=remaining(d);
      d.batches.forEach((b,i)=>{
        rows.push([label,item.code,item.name,`批次${i+1}`,b.qty||0,b.exp||'',b.used||0,batchRemaining(b),i===0?totalRem:'',i===0?safeStock[campus]?.[item.code]||0:'',b.note||'']);
      });
    });
  });
  const csv=rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=`透析液庫存_${today.toISOString().slice(0,10)}.csv`;a.click();
  URL.revokeObjectURL(url);
}
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
  const ss=document.getElementById('sync-status');
  if(ss){
    if(msg.includes('✓'))      {ss.textContent='● 已同步 Sheets';ss.style.color='#1a6b3a';}
    else if(msg.includes('⚠')) {ss.textContent='● 離線（本機備份）';ss.style.color='#9a6800';}
    else if(msg.includes('⏳')){ss.textContent='● 連線中…';ss.style.color='#6b8a9e';}
  }
}
function showTab(tab){
  document.querySelectorAll('.pane').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('pane-'+tab).classList.add('active');
  const btn=document.getElementById('tabn-'+tab);
  if(btn)btn.classList.add('active');
  if(tab==='douniu')document.getElementById('pane-douniu').innerHTML=renderCampus('douniu');
  else if(tab==='huwei')document.getElementById('pane-huwei').innerHTML=renderCampus('huwei');
  else if(tab==='log')document.getElementById('pane-log').innerHTML=renderLog();
  else if(tab==='settings'){
    document.getElementById('pane-settings').innerHTML=renderSettings();
    document.getElementById('pane-settings').classList.add('active');
  }
}
const GAS_URL='https://script.google.com/macros/s/AKfycbwbMrHgCHshcX6P202wgrzDghIPvHl26y1NUA8caust5BigXvJnRcdOkwPDRsffUUYkag/exec';

async function saveAll(){
  const btn=document.getElementById('savebtn');
  if(btn)btn.innerHTML='<i class="ti ti-loader" aria-hidden="true"></i> 儲存中…';
  try{
    const res=await fetch(GAS_URL,{
      method:'POST',
      headers:{'Content-Type':'text/plain'},
      body:JSON.stringify({action:'save',state,safeStock,logs})
    });
    const json=await res.json();
    if(json.ok){
      showToast('✓ 已同步至 Google Sheets');
      if(btn)btn.innerHTML='<i class="ti ti-check" aria-hidden="true"></i> 已儲存';
      setTimeout(()=>{if(btn)btn.innerHTML='<i class="ti ti-device-floppy" aria-hidden="true"></i> 儲存';},2000);
    }else{
      throw new Error(json.error||'unknown');
    }
  }catch(e){
    showToast('⚠ 同步失敗，已備存本機：'+e.message);
    localStorage.setItem('dialysis_backup',JSON.stringify({state,safeStock,logs}));
    if(btn)btn.innerHTML='<i class="ti ti-device-floppy" aria-hidden="true"></i> 儲存';
  }
}

function patchOldLogs(){
  logs.forEach(l=>{
    if(!l.msg)return;
    if(!l.msg.includes('調撥'))return;
    l.isTransfer=true;
    l.transferDir=l.campus==='斗六'?'d2h':l.campus==='虎尾'?'h2d':l.transferDir;
  });
}

function applyLoaded(p){
  if(p.state)['douniu','huwei'].forEach(c=>{
    if(p.state[c])ALL.forEach(i=>{if(p.state[c][i.code])state[c][i.code]={...defItem(),...p.state[c][i.code]};});
  });
  if(p.safeStock){
    const isOldFlat=!('douniu' in p.safeStock)&&!('huwei' in p.safeStock);
    if(isOldFlat){
      safeStock={douniu:{...p.safeStock},huwei:{...p.safeStock}};
    }else{
      safeStock={douniu:{...(p.safeStock.douniu||{})},huwei:{...(p.safeStock.huwei||{})}};
    }
  }
  if(p.logs)logs=p.logs;
  patchOldLogs();
}

async function init(){
  showToast('⏳ 載入中…');
  try{
    const res=await fetch(GAS_URL+'?action=load');
    const json=await res.json();
    if(json.ok){
      applyLoaded(json);
      showToast('✓ 已從 Google Sheets 載入');
    }else{
      throw new Error(json.error||'unknown');
    }
  }catch(e){
    // 載入失敗時退回本機備份
    try{
      const backup=localStorage.getItem('dialysis_backup');
      if(backup)applyLoaded(JSON.parse(backup));
      showToast('⚠ 無法連線，使用本機備份資料');
    }catch(e2){}
  }
  showTab('douniu');
}
init();
</script>
